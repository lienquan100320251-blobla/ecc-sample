<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Snake — Sample</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Snake — Sample (HTML/CSS/JS)</h1>
    <div class="info">
      <span id="score">Score: 0</span>
      <button id="restart">Restart</button>
    </div>
    <canvas id="game" width="400" height="400" aria-label="Snake game canvas"></canvas>
    <p class="hint">Use arrow keys or WASD to move. Press Space to restart when game over.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
